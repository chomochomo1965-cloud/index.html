<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スマホ用横書き履歴電卓</title>
<style>
body {
  font-family: sans-serif;
  text-align: center;
  margin-top: 50px;
  background: #f0f0f0;
}

/* 電卓本体 */
#calculator {
  position: relative; /* 本体内で✖を絶対配置するため */
  display: inline-block;
  background: #fffbe6;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 4px 8px rgba(0,0,0,0.2);
}

/* 本体閉じるボタン */
#closeCalculatorBtn {
  position: absolute;
  top: -15px;
  right: -15px;
  width: 45px;
  height: 45px;
  font-size: 24px;
  font-weight: bold;
  border-radius: 50%;
  border: none;
  background: #f44336;
  color: #fff;
  cursor: pointer;
  display: flex;
  justify-content: center;
  align-items: center;
  box-shadow: 0 2px 5px rgba(0,0,0,0.3);
}
#closeCalculatorBtn:active { transform: scale(0.9); }

#display {
  width: 90%;
  max-width: 300px;
  height: 60px;
  font-size: 30px;
  text-align: right;
  margin-bottom: 10px;
  padding: 10px;
  border-radius: 5px;
  border: 1px solid #ccc;
  background: #fff;
}

.btn {
  width: 70px;
  height: 70px;
  font-size: 28px;
  margin: 5px;
  cursor: pointer;
  border-radius: 10px;
  border: none;
  background: #fff;
  transition: 0.2s;
}
.btn:hover { background: #d4d4d4; }

/* 履歴ボタン */
#historyBtn {
  margin-top: 15px;
  width: 150px;
  height: 50px;
  font-size: 20px;
  writing-mode: horizontal-tb;
  text-align: center;
  white-space: nowrap;
  background: #4CAF50;
  color: #fff;
  font-weight: bold;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

/* モーダル */
#modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  justify-content: center;
  align-items: center;
}
#modalContent {
  position: relative;
  background: #fff;
  padding: 20px;
  border-radius: 10px;
  max-width: 90%;
  width: 300px;
  max-height: 80%;
  overflow-y: auto;
  text-align: left;
  font-size: 18px;
}

/* 履歴アイテム */
.historyItem {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 5px 10px;
  border-bottom: 1px solid #ccc;
  cursor: pointer;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.historyItem:hover { background: #e0e0e0; }

.closeBtn {
  margin-top: 10px;
  background: #f44336;
  color: #fff;
  border: none;
  padding: 10px 15px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 18px;
}
</style>
</head>
<body>

<h2>スマホ用横書き履歴電卓</h2>

<!-- 電卓本体 -->
<div id="calculator">
  <button id="closeCalculatorBtn" onclick="closeCalculator()">✖</button>

  <input type="text" id="display" readonly>

  <div>
    <button class="btn" onclick="press('7')">7</button>
    <button class="btn" onclick="press('8')">8</button>
    <button class="btn" onclick="press('9')">9</button>
    <button class="btn" onclick="press('/')">÷</button>
  </div>
  <div>
    <button class="btn" onclick="press('4')">4</button>
    <button class="btn" onclick="press('5')">5</button>
    <button class="btn" onclick="press('6')">6</button>
    <button class="btn" onclick="press('*')">×</button>
  </div>
  <div>
    <button class="btn" onclick="press('1')">1</button>
    <button class="btn" onclick="press('2')">2</button>
    <button class="btn" onclick="press('3')">3</button>
    <button class="btn" onclick="press('-')">−</button>
  </div>
  <div>
    <button class="btn" onclick="press('0')">0</button>
    <button class="btn" onclick="press('.')">.</button>
    <button class="btn" onclick="calculate()">=</button>
    <button class="btn" onclick="press('+')">+</button>
  </div>
  <div>
    <button class="btn" onclick="clearDisplay()">C</button>
  </div>

  <button id="historyBtn" class="btn" onclick="openModal()">履歴</button>
</div>

<!-- 履歴モーダル -->
<div id="modal">
  <div id="modalContent">
    <h3>履歴</h3>
    <div id="historyList"></div>
    <button class="closeBtn" onclick="closeModal()">閉じる</button>
  </div>
</div>

<script>
let expression = '';

// 電卓操作
function press(value) {
  expression += value;
  document.getElementById('display').value = expression;
}
function calculate() {
  try {
    const result = eval(expression);
    addHistory(expression + " = " + result);
    expression = result.toString();
    document.getElementById('display').value = expression;
  } catch(e) {
    document.getElementById('display').value = 'Error';
    expression = '';
  }
}
function clearDisplay() {
  expression = '';
  document.getElementById('display').value = '';
}

// 履歴管理
function addHistory(text) {
  const now = new Date();
  const weekdays = ['日','月','火','水','木','金','土'];
  const y = now.getFullYear();
  const m = now.getMonth() + 1;
  const d = now.getDate();
  const w = weekdays[now.getDay()];
  const dateStr = `${y}/${m}/${d} (${w})`;
  const entry = `[${dateStr}] ${text}`;

  let history = JSON.parse(localStorage.getItem('calcHistory') || '[]');
  history.unshift(entry);
  localStorage.setItem('calcHistory', JSON.stringify(history));
  updateHistoryList();
}

// モーダル
function openModal() {
  document.getElementById('modal').style.display = 'flex';
  updateHistoryList();
}
function closeModal() {
  document.getElementById('modal').style.display = 'none';
}

// 本体閉じる
function closeCalculator() {
  document.getElementById('calculator').style.display = 'none';
}

// 履歴リスト更新
function updateHistoryList() {
  const historyList = document.getElementById('historyList');
  historyList.innerHTML = '';
  const history = JSON.parse(localStorage.getItem('calcHistory') || '[]');

  history.forEach((item, index) => {
    const div = document.createElement('div');
    div.className = 'historyItem';
    div.textContent = item;

    div.addEventListener('click', () => {
      const formula = item.split(' = ')[0].split('] ')[1];
      expression = formula;
      document.getElementById('display').value = expression;
      closeModal();
    });

    const delBtn = document.createElement('button');
    delBtn.textContent = '×';
    delBtn.style.marginLeft = '5px';
    delBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      history.splice(index, 1);
      localStorage.setItem('calcHistory', JSON.stringify(history));
      updateHistoryList();
    });

    div.appendChild(delBtn);
    historyList.appendChild(div);
  });
}

// キーボード対応
document.addEventListener('keydown', (e) => {
  if ((e.key >= '0' && e.key <= '9') || e.key === '.' || ['+', '-', '*', '/'].includes(e.key)) {
    press(e.key);
  } else if (e.key === 'Enter') {
    calculate();
  } else if (e.key === 'Backspace') {
    expression = expression.slice(0, -1);
    document.getElementById('display').value = expression;
  } else if (e.key.toLowerCase() === 'c') {
    clearDisplay();
  }
});
</script>

</body>
</html>
